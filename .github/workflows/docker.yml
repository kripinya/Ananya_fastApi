name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo ${{ secrets.DOCKERTOKEN }} | docker login -u "kripinya" --password-stdin

      - name: Build Docker Image
        run: docker build -t kripinya/fastapi-app:v1 .

      - name: Push Docker Image
        run: docker push kripinya/fastapi-app:v1